Screens:
  Screen3:
    Properties:
      Fill: =ColorBg
      OnVisible: =Set(varSelectedRequest, First(Filter(Requests, false)))
    Children:
      - ScreenContainer3:
          Control: GroupContainer
          Variant: AutoLayout
          Properties:
            Fill: =ColorBg
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Vertical
            Width: =Parent.Width
          Children:
            - HeaderContainer3:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Fill: =ColorSurface
                  FillPortions: =0
                  Height: =64
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                  LayoutMinHeight: =0
                  LayoutMinWidth: =0
                  PaddingBottom: =8
                  PaddingLeft: =16
                  PaddingRight: =16
                  PaddingTop: =8
                Children:
                  - lblManagerTitle:
                      Control: ModernText
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        AutoHeight: =true
                        Color: =ColorTextPrimary
                        FontWeight: =FontWeight.Bold
                        Text: ="Хүлээгдэж буй хүсэлтүүд"
                        Wrap: =false
                  - badgePendingCount:
                      Control: Badge
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        Appearance: ='BadgeCanvas.Appearance'.Filled
                        Content: =Text(CountIf(Requests, ManagerEmail = varCurrentUserEmail && Status.Value = "Pending Manager"))
                        Shape: ='BadgeCanvas.Shape'.Circular
                        ThemeColor: ='BadgeCanvas.ThemeColor'.Warning
            - galContainer:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Fill: =ColorBg
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutMinHeight: =0
                  LayoutMinWidth: =0
                  PaddingBottom: =8
                  PaddingLeft: =16
                  PaddingRight: =16
                  PaddingTop: =12
                Children:
                  - galPendingRequests:
                      Control: Gallery
                      Variant: Vertical
                      Properties:
                        Height: =Parent.Height - 20
                        Items: =Filter(Requests, ManagerEmail = varCurrentUserEmail && Status.Value = "Pending Manager")
                        TemplatePadding: =8
                        TemplateSize: =110
                        Width: =Parent.Width - 32
                      Children:
                        - cardBg:
                            Control: GroupContainer
                            Variant: ManualLayout
                            Properties:
                              Fill: =If(!IsBlank(varSelectedRequest) && varSelectedRequest.ID = ThisItem.ID, ColorPrimaryLight, ColorSurface)
                              Height: =104
                              RadiusBottomLeft: =10
                              RadiusBottomRight: =10
                              RadiusTopLeft: =10
                              RadiusTopRight: =10
                              Width: =Parent.Width - 8
                              X: =4
                              Y: =3
                        - lblPendingRequester:
                            Control: Label
                            Properties:
                              Color: =ColorTextPrimary
                              FontWeight: =FontWeight.Bold
                              Height: =26
                              Size: =14
                              Text: =ThisItem.RequesterName & " — " & ThisItem.Title
                              Width: =Parent.Width - 28
                              X: =16
                              Y: =14
                        - lblPendingDates:
                            Control: Label
                            Properties:
                              Color: =ColorTextSecondary
                              Height: =20
                              Size: =12
                              Text: =Text(ThisItem.StartDate, "yyyy-mm-dd") & " – " & Text(ThisItem.EndDate, "yyyy-mm-dd")
                              Width: =Parent.Width - 28
                              X: =16
                              Y: =44
                        - lblPendingReason:
                            Control: Label
                            Properties:
                              Color: =ColorTextSecondary
                              Height: =30
                              Size: =12
                              Text: =PlainText(ThisItem.Reason)
                              Width: =Parent.Width - 28
                              X: =16
                              Y: =68
                        - btnSelectOverlay:
                            Control: Button
                            Properties:
                              Appearance: ='ButtonCanvas.Appearance'.Transparent
                              BorderStyle: =BorderStyle.None
                              Height: =110
                              OnSelect: =Set(varSelectedRequest, ThisItem)
                              Text: =""
                              Width: =Parent.Width
            - dividerAction:
                Control: GroupContainer
                Variant: ManualLayout
                Properties:
                  Fill: =RGBA(200, 200, 210, 1)
                  FillPortions: =0
                  Height: =1
                  LayoutMinHeight: =0
                  LayoutMinWidth: =0
            - actionContainer:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Fill: =ColorSurface
                  FillPortions: =0
                  Height: =144
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =8
                  LayoutMinHeight: =0
                  LayoutMinWidth: =0
                  PaddingBottom: =12
                  PaddingLeft: =16
                  PaddingRight: =16
                  PaddingTop: =12
                Children:
                  - lblActionStatus:
                      Control: ModernText
                      Properties:
                        AlignInContainer: =AlignInContainer.Stretch
                        Color: =If(IsBlank(varSelectedRequest), ColorTextSecondary, ColorTextPrimary)
                        FontWeight: =If(IsBlank(varSelectedRequest), FontWeight.Normal, FontWeight.Semibold)
                        Height: =20
                        Size: =13
                        Text: =If(IsBlank(varSelectedRequest), "↑ Хүсэлт дарж сонгоно уу", varSelectedRequest.RequesterName & " — " & varSelectedRequest.Title)
                        Wrap: =false
                  - txtComment:
                      Control: ModernTextInput
                      Properties:
                        AlignInContainer: =AlignInContainer.Stretch
                        BasePaletteColor: =ColorPrimary
                        Height: =40
                        Placeholder: ="Тайлбар (заавал биш)..."
                  - actionButtons:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        FillPortions: =0
                        Height: =44
                        LayoutAlignItems: =LayoutAlignItems.Stretch
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =8
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                      Children:
                        - btnApprove:
                            Control: ModernButton
                            Properties:
                              BasePaletteColor: =If(IsBlank(varSelectedRequest), RGBA(180, 180, 180, 1), ColorSuccess)
                              FillPortions: =1
                              Height: =44
                              OnSelect: |-
                                =If(!IsBlank(varSelectedRequest),
                                  Patch(Requests, varSelectedRequest, {Status: {Value: "Approved"}, ManagerComments: txtComment.Text});
                                  Reset(txtComment);
                                  Set(varSelectedRequest, First(Filter(Requests, false))))
                              Text: ="Зөвшөөрөх"
                        - btnReject:
                            Control: ModernButton
                            Properties:
                              BasePaletteColor: =If(IsBlank(varSelectedRequest), RGBA(180, 180, 180, 1), ColorDanger)
                              FillPortions: =1
                              Height: =44
                              OnSelect: |-
                                =If(!IsBlank(varSelectedRequest),
                                  Patch(Requests, varSelectedRequest, {Status: {Value: "Rejected"}, ManagerComments: txtComment.Text});
                                  Reset(txtComment);
                                  Set(varSelectedRequest, First(Filter(Requests, false))))
                              Text: ="Татгалзах"
            - FooterContainer3:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Fill: =ColorSurface
                  FillPortions: =0
                  Height: =64
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutJustifyContent: =LayoutJustifyContent.Center
                  LayoutMinHeight: =0
                  LayoutMinWidth: =0
                Children:
                  - tabNav3:
                      Control: ModernTabList
                      Properties:
                        AlignInContainer: =AlignInContainer.Stretch
                        BasePaletteColor: =ColorPrimary
                        Default: |-
                          ={Value: "Менежер"}
                        FillPortions: =1
                        Items: =Table({Value:"Нүүр"},{Value:"Менежер"})
                        OnChange: |-
                          =If(
                            Self.Selected.Value = "Нүүр", Navigate(Screen1, ScreenTransition.None),
                            Self.Selected.Value = "Менежер", Navigate(Screen3, ScreenTransition.None)
                          )
