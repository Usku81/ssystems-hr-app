Screens:
  Screen4:
    Properties:
      Fill: =ColorMainBg
    Children:
      - ScreenContainer4:
          Control: GroupContainer
          Variant: AutoLayout
          Properties:
            Fill: =ColorMainBg
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutGap: =0
            Width: =Parent.Width
          Children:
            - Sidebar4:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Fill: =ColorSurface
                  FillPortions: =0
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =4
                  LayoutMinHeight: =0
                  LayoutMinWidth: =0
                  PaddingBottom: =18
                  PaddingLeft: =14
                  PaddingRight: =14
                  PaddingTop: =18
                  Width: =220
                Children:
                  - brandRow4:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        FillPortions: =0
                        Height: =48
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =10
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        PaddingBottom: =14
                        PaddingLeft: =8
                      Children:
                        - brandBox4:
                            Control: GroupContainer
                            Variant: AutoLayout
                            Properties:
                              Fill: =ColorPrimary
                              FillPortions: =0
                              Height: =30
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutJustifyContent: =LayoutJustifyContent.Center
                              LayoutMinHeight: =0
                              LayoutMinWidth: =0
                              RadiusBottomLeft: =8
                              RadiusBottomRight: =8
                              RadiusTopLeft: =8
                              RadiusTopRight: =8
                              Width: =30
                            Children:
                              - brandLetter4:
                                  Control: ModernText
                                  Properties:
                                    Align: =Align.Center
                                    AutoHeight: =true
                                    Color: =ColorSurface
                                    FontWeight: =FontWeight.Bold
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =15
                                    Text: ="S"
                        - brandText4:
                            Control: ModernText
                            Properties:
                              AutoHeight: =true
                              Color: =ColorTextDark
                              FontWeight: =FontWeight.Bold
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              Size: =15
                              Text: ="SSystems"
                              Wrap: =false
                  - navMy4:
                      Control: ModernButton
                      Properties:
                        AlignInContainer: =AlignInContainer.Stretch
                        Appearance: =ButtonAppearance.Subtle
                        BasePaletteColor: =ColorPrimary
                        Height: =40
                        OnSelect: =Navigate(Screen1)
                        Text: ="Миний хүсэлтүүд"
                  - navApprovals4:
                      Control: ModernButton
                      Properties:
                        AlignInContainer: =AlignInContainer.Stretch
                        Appearance: =ButtonAppearance.Transparent
                        BasePaletteColor: =ColorTextMuted
                        Height: =40
                        OnSelect: =Navigate(Screen3)
                        Text: ="Батлах хүсэлтүүд"
                        Visible: =varIsManager
                  - navAdd4:
                      Control: ModernButton
                      Properties:
                        AlignInContainer: =AlignInContainer.Stretch
                        Appearance: =ButtonAppearance.Transparent
                        BasePaletteColor: =ColorTextMuted
                        Height: =40
                        OnSelect: =Notify("Удахгүй нэмэгдэнэ.", NotificationType.Information)
                        Text: ="Ажилтан нэмэх"
                        Visible: =varIsManager
                  - navSpacer4:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =RGBA(0, 0, 0, 0)
                        FillPortions: =1
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                  - profileRow4:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        FillPortions: =0
                        Height: =52
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =10
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        PaddingLeft: =8
                        PaddingTop: =10
                      Children:
                        - profileAvatar4:
                            Control: Avatar
                            Properties:
                              BasePaletteColor: =ColorPrimary
                              Height: =32
                              Name: =varCurrentUserName
                              Width: =32
                        - profileInfo4:
                            Control: GroupContainer
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =1
                              LayoutAlignItems: =LayoutAlignItems.Start
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutMinHeight: =0
                              LayoutMinWidth: =0
                            Children:
                              - profileName4:
                                  Control: ModernText
                                  Properties:
                                    AutoHeight: =true
                                    Color: =ColorTextDark
                                    FontWeight: =FontWeight.Semibold
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =13
                                    Text: =varCurrentUserName
                                    Wrap: =false
                              - profileRole4:
                                  Control: ModernText
                                  Properties:
                                    AutoHeight: =true
                                    Color: =ColorTextFaint
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =11
                                    Text: =If(varIsManager, "Менежер", "Ажилтан")
                                    Wrap: =false
            - MainColumn4:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Fill: =ColorMainBg
                  FillPortions: =1
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =0
                  LayoutMinHeight: =0
                  LayoutMinWidth: =0
                Children:
                  - TopBar4:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =ColorSurface
                        FillPortions: =0
                        Height: =64
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =10
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        PaddingBottom: =10
                        PaddingLeft: =28
                        PaddingRight: =28
                        PaddingTop: =10
                      Children:
                        - TopBarText4:
                            Control: GroupContainer
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =1
                              LayoutAlignItems: =LayoutAlignItems.Start
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutMinHeight: =0
                              LayoutMinWidth: =0
                            Children:
                              - lblCrumb4:
                                  Control: ModernText
                                  Properties:
                                    AutoHeight: =true
                                    Color: =ColorTextFaint
                                    FontWeight: =FontWeight.Semibold
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =12
                                    Text: ="Миний хүсэлт"
                                    Wrap: =false
                              - lblTitle4:
                                  Control: ModernText
                                  Properties:
                                    AutoHeight: =true
                                    Color: =ColorTextDark
                                    FontWeight: =FontWeight.Bold
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =17
                                    Text: ="Илүү цагийн хүсэлт"
                                    Wrap: =false
                  - ContentArea4:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =ColorMainBg
                        FillPortions: =1
                        LayoutAlignItems: =LayoutAlignItems.Stretch
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =16
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        LayoutOverflowY: =LayoutOverflow.Scroll
                        PaddingBottom: =26
                        PaddingLeft: =30
                        PaddingRight: =30
                        PaddingTop: =26
                      Children:
                        - FormCard4:
                            Control: GroupContainer
                            Variant: AutoLayout
                            Properties:
                              Fill: =ColorSurface
                              FillPortions: =0
                              LayoutAlignItems: =LayoutAlignItems.Stretch
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =20
                              LayoutMinHeight: =0
                              LayoutMinWidth: =0
                              PaddingBottom: =30
                              PaddingLeft: =34
                              PaddingRight: =34
                              PaddingTop: =30
                              RadiusBottomLeft: =14
                              RadiusBottomRight: =14
                              RadiusTopLeft: =14
                              RadiusTopRight: =14
                            Children:
                              - lblReasonLabel4:
                                  Control: ModernText
                                  Properties:
                                    AutoHeight: =true
                                    Color: =ColorTextDark
                                    FontWeight: =FontWeight.Semibold
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =13
                                    Text: ="Тайлбар"
                                    Wrap: =false
                              - txtReason4:
                                  Control: ModernTextInput
                                  Properties:
                                    AlignInContainer: =AlignInContainer.Stretch
                                    BasePaletteColor: =ColorPrimary
                                    Placeholder: ="Ажлын тайлбарыг оруулна уу."
                              - lblStartLabel4:
                                  Control: ModernText
                                  Properties:
                                    AutoHeight: =true
                                    Color: =ColorTextDark
                                    FontWeight: =FontWeight.Semibold
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =13
                                    Text: ="Эхлэх өдөр"
                                    Wrap: =false
                              - dpStartDate4:
                                  Control: ModernDatePicker
                                  Properties:
                                    AlignInContainer: =AlignInContainer.Stretch
                                    BasePaletteColor: =ColorPrimary
                                    Width: =Parent.Width - 68
                              - lblEndLabel4:
                                  Control: ModernText
                                  Properties:
                                    AutoHeight: =true
                                    Color: =ColorTextDark
                                    FontWeight: =FontWeight.Semibold
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =13
                                    Text: ="Дуусах өдөр"
                                    Wrap: =false
                              - dpEndDate4:
                                  Control: ModernDatePicker
                                  Properties:
                                    AlignInContainer: =AlignInContainer.Stretch
                                    BasePaletteColor: =ColorPrimary
                                    Width: =Parent.Width - 68
                              - lblHoursLabel4:
                                  Control: ModernText
                                  Properties:
                                    AutoHeight: =true
                                    Color: =ColorTextDark
                                    FontWeight: =FontWeight.Semibold
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =13
                                    Text: ="Илүү цаг"
                                    Wrap: =false
                              - txtHours4:
                                  Control: ModernTextInput
                                  Properties:
                                    AlignInContainer: =AlignInContainer.Stretch
                                    BasePaletteColor: =ColorPrimary
                                    Format: =TextFormat.Number
                                    Placeholder: ="0"
                              - lblCompLabel4:
                                  Control: ModernText
                                  Properties:
                                    AutoHeight: =true
                                    Color: =ColorTextDark
                                    FontWeight: =FontWeight.Semibold
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =13
                                    Text: ="Нөхөж амарсан эсэх"
                                    Wrap: =false
                              - togComp4:
                                  Control: ModernButton
                                  Properties:
                                    Appearance: =If(varCompRest, ButtonAppearance.Primary, ButtonAppearance.Outline)
                                    BasePaletteColor: =If(varCompRest, ColorPrimary, ColorTextMuted)
                                    FillPortions: =0
                                    Height: =40
                                    OnSelect: =Set(varCompRest, !varCompRest)
                                    Text: =If(varCompRest, "Тийм", "Үгүй")
                                    Width: =120
                              - lblReportLabel4:
                                  Control: ModernText
                                  Properties:
                                    AutoHeight: =true
                                    Color: =ColorTextDark
                                    FontWeight: =FontWeight.Semibold
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =13
                                    Text: ="Тайлан *"
                                    Wrap: =false
                              - dropReport4:
                                  Control: GroupContainer
                                  Variant: AutoLayout
                                  Properties:
                                    AlignInContainer: =AlignInContainer.Stretch
                                    Fill: =ColorMainBg
                                    FillPortions: =0
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                    LayoutDirection: =LayoutDirection.Vertical
                                    LayoutGap: =11
                                    LayoutJustifyContent: =LayoutJustifyContent.Center
                                    LayoutMinHeight: =0
                                    LayoutMinWidth: =0
                                    PaddingBottom: =18
                                    PaddingLeft: =18
                                    PaddingRight: =18
                                    PaddingTop: =18
                                    RadiusBottomLeft: =10
                                    RadiusBottomRight: =10
                                    RadiusTopLeft: =10
                                    RadiusTopRight: =10
                                  Children:
                                    - lblNoFile4:
                                        Control: ModernText
                                        Properties:
                                          Align: =Align.Center
                                          AutoHeight: =true
                                          Color: =ColorTextFaint
                                          PaddingBottom: =0
                                          PaddingLeft: =0
                                          PaddingRight: =0
                                          PaddingTop: =0
                                          Size: =13
                                          Text: ="Файл сонгогдоогүй байна."
                                          Wrap: =false
                                    - btnAttach4:
                                        Control: ModernButton
                                        Properties:
                                          Appearance: =ButtonAppearance.Outline
                                          BasePaletteColor: =ColorPrimary
                                          FillPortions: =0
                                          Height: =38
                                          OnSelect: =Notify("Файл хавсаргах нь өгөгдлийн эх сурвалжтай холбогдсоны дараа идэвхжинэ.", NotificationType.Information)
                                          Text: ="Тайлан хавсаргах"
                        - FormActions4:
                            Control: GroupContainer
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =0
                              Height: =48
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =12
                              LayoutJustifyContent: =LayoutJustifyContent.End
                              LayoutMinHeight: =0
                              LayoutMinWidth: =0
                            Children:
                              - btnCancel4:
                                  Control: ModernButton
                                  Properties:
                                    Appearance: =ButtonAppearance.Outline
                                    BasePaletteColor: =ColorTextMuted
                                    FillPortions: =0
                                    Height: =44
                                    OnSelect: =Navigate(Screen1)
                                    Text: ="Буцах"
                              - btnSave4:
                                  Control: ModernButton
                                  Properties:
                                    BasePaletteColor: =ColorPrimary
                                    FillPortions: =0
                                    Height: =44
                                    OnSelect: |-
                                      =Patch(Requests, Defaults(Requests), {
                                        Title: "Илүү цагийн хүсэлт",
                                        Status: {Value: "Pending Manager"},
                                        StartDate: dpStartDate4.SelectedDate,
                                        EndDate: dpEndDate4.SelectedDate,
                                        Reason: txtReason4.Text & " | Илүү цаг: " & txtHours4.Value & " | Нөхөж амарсан: " & If(varCompRest, "Тийм", "Үгүй"),
                                        SubmittedOn: Today(),
                                        RequesterEmail: varCurrentUserEmail,
                                        RequesterName: varCurrentUserName,
                                        ManagerEmail: IfError(Office365Users.ManagerV2(varCurrentUserEmail).mail, ""),
                                        ManagerComments: ""
                                      });
                                      Set(varCompRest, false);
                                      Navigate(Screen1)
                                    Text: ="Хадгалах"
