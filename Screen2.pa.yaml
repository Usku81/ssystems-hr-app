Screens:
  Screen2:
    Properties:
      Fill: =ColorMainBg
    Children:
      - ScreenContainer2:
          Control: GroupContainer
          Variant: AutoLayout
          Properties:
            Fill: =ColorMainBg
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutGap: =0
            Width: =Parent.Width
          Children:
            - Sidebar2:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Fill: =ColorSurface
                  FillPortions: =0
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =4
                  LayoutMinHeight: =0
                  LayoutMinWidth: =0
                  PaddingBottom: =18
                  PaddingLeft: =14
                  PaddingRight: =14
                  PaddingTop: =18
                  Width: =220
                Children:
                  - brandRow2:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        FillPortions: =0
                        Height: =48
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =10
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        PaddingBottom: =14
                        PaddingLeft: =8
                      Children:
                        - brandBox2:
                            Control: GroupContainer
                            Variant: AutoLayout
                            Properties:
                              Fill: =ColorPrimary
                              FillPortions: =0
                              Height: =30
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutJustifyContent: =LayoutJustifyContent.Center
                              LayoutMinHeight: =0
                              LayoutMinWidth: =0
                              RadiusBottomLeft: =8
                              RadiusBottomRight: =8
                              RadiusTopLeft: =8
                              RadiusTopRight: =8
                              Width: =30
                            Children:
                              - brandLetter2:
                                  Control: ModernText
                                  Properties:
                                    Align: =Align.Center
                                    AutoHeight: =true
                                    Color: =ColorSurface
                                    FontWeight: =FontWeight.Bold
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =15
                                    Text: ="S"
                        - brandText2:
                            Control: ModernText
                            Properties:
                              AutoHeight: =true
                              Color: =ColorTextDark
                              FontWeight: =FontWeight.Bold
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              Size: =15
                              Text: ="SSystems"
                              Wrap: =false
                  - navMy2:
                      Control: ModernButton
                      Properties:
                        AlignInContainer: =AlignInContainer.Stretch
                        Appearance: =ButtonAppearance.Subtle
                        BasePaletteColor: =ColorPrimary
                        Height: =40
                        OnSelect: =Navigate(Screen1)
                        Text: ="Миний хүсэлтүүд"
                  - navApprovals2:
                      Control: ModernButton
                      Properties:
                        AlignInContainer: =AlignInContainer.Stretch
                        Appearance: =ButtonAppearance.Transparent
                        BasePaletteColor: =ColorTextMuted
                        Height: =40
                        OnSelect: =Navigate(Screen3)
                        Text: ="Батлах хүсэлтүүд"
                        Visible: =varIsManager
                  - navAdd2:
                      Control: ModernButton
                      Properties:
                        AlignInContainer: =AlignInContainer.Stretch
                        Appearance: =ButtonAppearance.Transparent
                        BasePaletteColor: =ColorTextMuted
                        Height: =40
                        OnSelect: =Notify("Удахгүй нэмэгдэнэ.", NotificationType.Information)
                        Text: ="Ажилтан нэмэх"
                        Visible: =varIsManager
                  - navSpacer2:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =RGBA(0, 0, 0, 0)
                        FillPortions: =1
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                  - profileRow2:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        FillPortions: =0
                        Height: =52
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =10
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        PaddingLeft: =8
                        PaddingTop: =10
                      Children:
                        - profileAvatar2:
                            Control: Avatar
                            Properties:
                              BasePaletteColor: =ColorPrimary
                              Height: =32
                              Name: =varCurrentUserName
                              Width: =32
                        - profileInfo2:
                            Control: GroupContainer
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =1
                              LayoutAlignItems: =LayoutAlignItems.Start
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutMinHeight: =0
                              LayoutMinWidth: =0
                            Children:
                              - profileName2:
                                  Control: ModernText
                                  Properties:
                                    AutoHeight: =true
                                    Color: =ColorTextDark
                                    FontWeight: =FontWeight.Semibold
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =13
                                    Text: =varCurrentUserName
                                    Wrap: =false
                              - profileRole2:
                                  Control: ModernText
                                  Properties:
                                    AutoHeight: =true
                                    Color: =ColorTextFaint
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =11
                                    Text: =If(varIsManager, "Менежер", "Ажилтан")
                                    Wrap: =false
            - MainColumn2:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Fill: =ColorMainBg
                  FillPortions: =1
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =0
                  LayoutMinHeight: =0
                  LayoutMinWidth: =0
                Children:
                  - TopBar2:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =ColorSurface
                        FillPortions: =0
                        Height: =64
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =10
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        PaddingBottom: =10
                        PaddingLeft: =28
                        PaddingRight: =28
                        PaddingTop: =10
                      Children:
                        - TopBarText2:
                            Control: GroupContainer
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =1
                              LayoutAlignItems: =LayoutAlignItems.Start
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutMinHeight: =0
                              LayoutMinWidth: =0
                            Children:
                              - lblCrumb2:
                                  Control: ModernText
                                  Properties:
                                    AutoHeight: =true
                                    Color: =ColorTextFaint
                                    FontWeight: =FontWeight.Semibold
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =12
                                    Text: ="Миний хүсэлт"
                                    Wrap: =false
                              - lblTitle2:
                                  Control: ModernText
                                  Properties:
                                    AutoHeight: =true
                                    Color: =ColorTextDark
                                    FontWeight: =FontWeight.Bold
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =17
                                    Text: ="Шинэ хүсэлт"
                                    Wrap: =false
                  - ContentArea2:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =ColorMainBg
                        FillPortions: =1
                        LayoutAlignItems: =LayoutAlignItems.Stretch
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =16
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        LayoutOverflowY: =LayoutOverflow.Scroll
                        PaddingBottom: =26
                        PaddingLeft: =30
                        PaddingRight: =30
                        PaddingTop: =26
                      Children:
                        - FormCard2:
                            Control: GroupContainer
                            Variant: AutoLayout
                            Properties:
                              Fill: =ColorSurface
                              FillPortions: =0
                              LayoutAlignItems: =LayoutAlignItems.Stretch
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =22
                              LayoutMinHeight: =0
                              LayoutMinWidth: =0
                              PaddingBottom: =30
                              PaddingLeft: =34
                              PaddingRight: =34
                              PaddingTop: =30
                              RadiusBottomLeft: =14
                              RadiusBottomRight: =14
                              RadiusTopLeft: =14
                              RadiusTopRight: =14
                            Children:
                              - lblReasonLabel2:
                                  Control: ModernText
                                  Properties:
                                    AutoHeight: =true
                                    Color: =ColorTextDark
                                    FontWeight: =FontWeight.Semibold
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =13
                                    Text: ="Тайлбар *"
                                    Wrap: =false
                              - txtReason2:
                                  Control: ModernTextInput
                                  Properties:
                                    AlignInContainer: =AlignInContainer.Stretch
                                    BasePaletteColor: =ColorPrimary
                                    Placeholder: ="Хүсэлтийн тайлбарыг бичнэ үү"
                              - lblTypeLabel2:
                                  Control: ModernText
                                  Properties:
                                    AutoHeight: =true
                                    Color: =ColorTextDark
                                    FontWeight: =FontWeight.Semibold
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =13
                                    Text: ="Зориулалт *"
                                    Wrap: =false
                              - galTypes2:
                                  Control: Gallery
                                  Variant: Vertical
                                  Properties:
                                    FillPortions: =0
                                    Height: =RoundUp(CountRows(RequestTypes) / 3, 0) * 50
                                    Items: =RequestTypes
                                    ShowScrollbar: =false
                                    TemplatePadding: =8
                                    TemplateSize: =48
                                    Width: =Parent.Width - 68
                                    WrapCount: =3
                                  Children:
                                    - pillType2:
                                        Control: ModernButton
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Stretch
                                          Appearance: =If(!IsBlank(varSelectedType) && varSelectedType.Title = ThisItem.Title, ButtonAppearance.Primary, ButtonAppearance.Outline)
                                          BasePaletteColor: =If(!IsBlank(varSelectedType) && varSelectedType.Title = ThisItem.Title, ColorPrimary, ColorTextMuted)
                                          Height: =40
                                          OnSelect: =Set(varSelectedType, ThisItem)
                                          Text: =ThisItem.Title
                                          Width: =Parent.TemplateWidth - 8
                              - lblStartLabel2:
                                  Control: ModernText
                                  Properties:
                                    AutoHeight: =true
                                    Color: =ColorTextDark
                                    FontWeight: =FontWeight.Semibold
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =13
                                    Text: ="Эхлэх өдөр *"
                                    Wrap: =false
                              - dpStartDate2:
                                  Control: ModernDatePicker
                                  Properties:
                                    AlignInContainer: =AlignInContainer.Stretch
                                    BasePaletteColor: =ColorPrimary
                                    Width: =Parent.Width - 68
                              - lblEndLabel2:
                                  Control: ModernText
                                  Properties:
                                    AutoHeight: =true
                                    Color: =ColorTextDark
                                    FontWeight: =FontWeight.Semibold
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =13
                                    Text: ="Дуусах өдөр *"
                                    Wrap: =false
                              - dpEndDate2:
                                  Control: ModernDatePicker
                                  Properties:
                                    AlignInContainer: =AlignInContainer.Stretch
                                    BasePaletteColor: =ColorPrimary
                                    Width: =Parent.Width - 68
                        - FormActions2:
                            Control: GroupContainer
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =0
                              Height: =48
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =12
                              LayoutJustifyContent: =LayoutJustifyContent.End
                              LayoutMinHeight: =0
                              LayoutMinWidth: =0
                            Children:
                              - btnCancel2:
                                  Control: ModernButton
                                  Properties:
                                    Appearance: =ButtonAppearance.Outline
                                    BasePaletteColor: =ColorTextMuted
                                    FillPortions: =0
                                    Height: =44
                                    OnSelect: =Navigate(Screen1)
                                    Text: ="Буцах"
                              - btnSubmit2:
                                  Control: ModernButton
                                  Properties:
                                    BasePaletteColor: =ColorPrimary
                                    FillPortions: =0
                                    Height: =44
                                    OnSelect: |-
                                      =If(
                                        !IsBlank(varSelectedType) && varSelectedType.Title = "Томилолт",
                                        Navigate(Screen5),
                                        Patch(Requests, Defaults(Requests), {
                                          Title: varSelectedType.Title,
                                          Status: {Value: "Pending Manager"},
                                          StartDate: dpStartDate2.SelectedDate,
                                          EndDate: dpEndDate2.SelectedDate,
                                          Reason: txtReason2.Text,
                                          SubmittedOn: Today(),
                                          RequesterEmail: varCurrentUserEmail,
                                          RequesterName: varCurrentUserName,
                                          ManagerEmail: IfError(Office365Users.ManagerV2(varCurrentUserEmail).mail, ""),
                                          ManagerComments: ""
                                        });
                                        Navigate(Screen1)
                                      )
                                    Text: ="Илгээх"
